<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHCP - A parents guide</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>
    <div class="hero">
        <h1>EHCP - A Parents Guide</h1>
    </div>
    <div class="ehcp-info-header">
  <div class="timeline-meta">
    <span><strong>The EHCP Process:</strong> Total Legal Limit: 20 Weeks</span>
  </div>
  
  <div class="timeline-bar">
    <div class="timeline-segment">
      <span class="week-tag">Week 0-6</span>
      <span class="label">Request & Decision</span>
    </div>
    <div class="timeline-segment">
      <span class="week-tag">Week 6-12</span>
      <span class="label">Assessment Phase</span>
    </div>
    <div class="timeline-segment">
      <span class="week-tag">Week 12-16</span>
      <span class="label">Draft Plan Issued</span>
    </div>
    <div class="timeline-segment">
      <span class="week-tag">Week 20</span>
      <span class="label">Final Plan Sent</span>
    </div>
  </div>
</div>
    <div class="container" id="auth-container">
        <h2>Register</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <hr>
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div class="container hidden" id="app-container">
        <h2>Welcome</h2>
        <button onclick="logout()">Logout</button>
        <hr>
        <h2>Create a Post</h2>
        <input type="text" id="post-title" placeholder="Title">
        <textarea id="post-content" placeholder="Content"></textarea>
        <button onclick="createPost()">Submit Post</button>
        <hr>
        <h2>Posts</h2>
        <button onclick="fetchPosts()">Load Posts</button>
        <div id="posts"></div>
    </div>

    <script src="./assets/script.js"></script>
</body>

</html>
